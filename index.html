<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="ttt.css">
    <script defer src="ttt.js"></script>
</head>
<body>
    <div class="container">
        <div class="topBar">
            <p id="topBarContent">Tic Tac Toe</p>
        </div>
        <div class="center">
            <div class="leftSide">
                <p id="leftSide">Player 1's Turn</p>
            </div>
            <div class="game">
                <div id="0"></div>
                <div id="1"></div>
                <div id="2"></div>
                <div id="3"></div>
                <div id="4"></div>
                <div id="5"></div>
                <div id="6"></div>
                <div id="7"></div>
                <div id="8"></div>
            </div>
            <div class="rightSide">
                <p id="rightSide">Player 2's Turn</p>
            </div>
        </div>
        <div class="bottom">
            <button id="newGame">New Game</button>
        </div>
    </div>
</body>
</html>
